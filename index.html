<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Far &amp; Fair</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&family=Montserrat:wght@500;600;700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-wrap">
      <div class="page">
        <header class="site-header">
          <h1 class="site-title">Far &amp; Fair</h1>
          <p class="site-intro">
            How far a place is from you, and what an amount is worth in another currency. Saved places
            stay in this browser only.
          </p>
        </header>

        <main>
          <section class="card" aria-labelledby="loc-heading">
            <p class="card__kicker">Step 1</p>
            <h2 id="loc-heading">Your location</h2>
            <p class="card__actions">
              <button type="button" class="btn" id="btn-use-location">Use my location</button>
            </p>
            <p class="status" id="location-status" role="status"></p>
            <form id="form-home-city" novalidate>
              <p class="form-line">
                <label for="input-home-city">Or type your city</label>
                <input
                  type="text"
                  id="input-home-city"
                  name="homeCity"
                  placeholder="City name"
                  autocomplete="address-level2"
                />
                <button type="submit" class="btn">Set</button>
              </p>
            </form>
            <p class="coords" id="coords-readout" hidden></p>
          </section>

          <section class="card" aria-labelledby="dist-heading">
            <p class="card__kicker">Step 2</p>
            <h2 id="dist-heading">Destination</h2>
            <form id="form-destination" novalidate>
              <p class="form-line">
                <label for="input-destination">City or place</label>
                <input
                  type="text"
                  id="input-destination"
                  name="destination"
                  placeholder="City name"
                  required
                  autocomplete="off"
                />
                <button type="submit" class="btn">Distance</button>
              </p>
            </form>
            <p class="status status--error" id="destination-error" hidden></p>
            <div class="result-card" id="distance-result" hidden>
              <p><strong id="distance-value"></strong></p>
              <p id="distance-sub"></p>
              <p>
                <button type="button" class="btn btn-link" id="btn-save-place">Save place</button>
              </p>
            </div>
          </section>

          <section class="card card--dashed" aria-labelledby="fx-heading">
            <p class="card__kicker">Step 3</p>
            <h2 id="fx-heading">Currency</h2>
            <form id="form-currency" novalidate>
              <p class="form-line form-line--stack">
                <span class="field-group">
                  <label for="select-from">From</label>
                  <select id="select-from" name="from"></select>
                </span>
                <span class="field-group">
                  <label for="select-to">To</label>
                  <select id="select-to" name="to"></select>
                </span>
              </p>
              <p class="form-line">
                <label for="input-amount">Amount</label>
                <input
                  type="number"
                  id="input-amount"
                  name="amount"
                  min="0"
                  step="0.01"
                  value="100"
                />
                <button type="submit" class="btn">Convert</button>
              </p>
            </form>
            <p class="status status--error" id="currency-error" hidden></p>
            <div class="result-card" id="currency-result" hidden>
              <p><strong id="currency-value"></strong></p>
              <p class="small" id="currency-sub"></p>
            </div>
          </section>

            <div class="bottom-zone">
              <section class="card card--flat" aria-labelledby="saved-heading">
                <p class="card__kicker">Step 4</p>
                <h2 id="saved-heading">Saved places</h2>
                <p class="small">Stored in <code>localStorage</code> on this device.</p>
                <ul id="saved-list"></ul>
                <p id="empty-saved">None saved yet.</p>
              </section>
            </div>
        </main>
      </div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
